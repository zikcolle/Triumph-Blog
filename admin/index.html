<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tryumph Content Manager | CMS Panel</title>
  <!-- Include Decap CMS script CDN library -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <!-- Include Netlify Identity widget -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    // Ensure Decap CMS uses the correct Netlify Identity endpoint when running locally
    if (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1") {
      const config = window.CMS_CONFIG || {};
      config.backend = config.backend || {};
      config.backend.identity_url = "https://tryumph-magazine.netlify.app/.netlify/identity";
      window.CMS_CONFIG = config;
    }
  </script>
  <script>
    // Initialize Decap CMS after config is set
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            // Reload after login to get fresh token
            document.location.reload();
          });
        }
      });
    }
  </script>
</head>
<body>
</body>
</html>
