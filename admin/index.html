<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tryumph Content Manager | CMS Panel</title>

  <!-- Decap CMS script -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <!-- Netlify Identity widget -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <script>
    // 1️⃣ Point local dev to the correct Netlify Identity endpoint
    if (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1") {
      const cfg = window.CMS_CONFIG || {};
      cfg.backend = cfg.backend || {};
      cfg.backend.identity_url = "https://tryumph-magazine.netlify.app/.netlify/identity";
      window.CMS_CONFIG = cfg;
    }

    // 2️⃣ Netlify Identity init handling (auto‑login refresh)
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => document.location.reload());
        }
      });
    }

    // 3️⃣ Decap CMS configuration (inline, no external config.yml)
    const cmsConfig = {
      backend: { name: "git-gateway", branch: "main" },
      media_folder: "static/img",
      public_folder: "/img",
      collections: [
        {
          name: "posts",
          label: "Posts",
          folder: "content/posts",
          create: true,
          slug: "{{slug}}",
          fields: [
            { label: "Title", name: "title", widget: "string" },
            { label: "Body", name: "body", widget: "markdown" }
          ]
        },
        {
          name: "comments",
          label: "Comments",
          folder: "content/comments",
          create: true,
          slug: "{{id}}",
          fields: [
            { label: "Email", name: "email", widget: "string" },
            { label: "Content", name: "content", widget: "text" },
            { label: "Parent ID", name: "parent_id", widget: "number", required: false }
          ]
        }
      ]
    };

    // 4️⃣ Initialise Decap CMS UI
    if (window.CMS) {
      window.CMS.init({ config: cmsConfig });
    }
  </script>
</head>
<body>
  <div id="nc-root"></div>
</body>
</html>
