<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tryumph Content Manager | CMS Panel</title>
  <!-- Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* Premium styling - glassmorphism card */
    body {
      display: flex;
      justify-content: center;
      align-items: start;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      font-family: 'Inter', system-ui, sans-serif;
      color: #fff;
    }
    #auth-card {
      margin-top: 80px;
      padding: 2rem;
      width: 340px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      animation: fadeIn 0.6s ease;
    }
    #auth-card h2 {
      margin-bottom: 1rem;
      font-weight: 600;
      text-align: center;
    }
    #auth-card input {
      width: 100%;
      padding: 0.6rem 0.8rem;
      margin-bottom: 0.8rem;
      border: none;
      border-radius: 6px;
      background: rgba(255,255,255,0.2);
      color: #fff;
    }
    #auth-card button {
      width: 100%;
      padding: 0.6rem;
      background: #0f62fe;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #auth-card button:hover {
      background: #0a4ac4;
    }
    #logout-btn {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: transparent;
      border: 1px solid #fff;
      color: #fff;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      cursor: pointer;
    }
    @keyframes fadeIn {
      from {opacity:0; transform:translateY(-10px);}
      to {opacity:1; transform:translateY(0);}
    }
  </style>
</head>
<body>
  <div id="auth-card">
    <h2>CMS Sign In</h2>
    <form id="login-form">
      <input type="email" id="login-email" placeholder="Email" required />
      <input type="password" id="login-pass" placeholder="Password" required />
      <button type="submit">Sign In</button>
    </form>
  </div>

  <div id="cms-root" style="display:none; width:100%;"></div>
  <button id="logout-btn" style="display:none;">Logout</button>

  <script>
    // ----- Supabase configuration -----
    const SUPABASE_URL = "https://isxjekzmqquxipahaack.supabase.co"; // <--- replace with your Supabase project URL
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlzeGpla3ptcXF1eGlwYWhhYWNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMDgzMTUsImV4cCI6MjA5Nzg4NDMxNX0.lJNmujk6NfEQG-tloi39Qj_w5saVTw1jwBdgANU44mQ"; // <--- replace with your public anon key
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ----- Auth flow -----
    async function checkSession() {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        document.getElementById('auth-card').style.display = 'none';
        document.getElementById('logout-btn').style.display = 'block';
        initCMS();
      } else {
        document.getElementById('auth-card').style.display = 'block';
        document.getElementById('logout-btn').style.display = 'none';
      }
    }

    // login handler
    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-pass').value;
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        alert('Login failed: ' + error.message);
        console.error(error);
        return;
      }
      await checkSession();
    });

    // logout handler
    document.getElementById('logout-btn').addEventListener('click', async () => {
      await supabase.auth.signOut();
      await checkSession();
    });

    // listen for auth changes (magic‑link redirects, etc.)
    supabase.auth.onAuthStateChange((_event, _session) => {
      checkSession();
    });

    // ----- Decap CMS init -----
    function initCMS() {
      document.getElementById('cms-root').style.display = 'block';
      const cmsConfig = {
        backend: {
          name: "github",
          repo: "zikcolle/Triumph-Blog", // <--- replace with your repo
          branch: "main",
          auth_type: "personalaccess_token"
          token: "%CMS_GITHUB_TOKEN%"   // Vercel will replace this placeholder with the env var
          // If you expose a token via Vercel env var, replace the placeholder below:
          // token: process.env.CMS_GITHUB_TOKEN
        },
        media_folder: "static/img",
        public_folder: "/img",
        collections: [
          {
            name: "posts",
            label: "Posts",
            folder: "content/posts",
            create: true,
            slug: "{{slug}}",
            fields: [
              { label: "Title", name: "title", widget: "string" },
              { label: "Body", name: "body", widget: "markdown" }
            ]
          },
          {
            name: "comments",
            label: "Comments",
            folder: "content/comments",
            create: true,
            slug: "{{id}}",
            fields: [
              { label: "Email", name: "email", widget: "string" },
              { label: "Content", name: "content", widget: "text" },
              { label: "Parent ID", name: "parent_id", widget: "number", required: false }
            ]
          }
        ]
      };
      if (window.CMS) {
        window.CMS.init({ config: cmsConfig });
      } else {
        console.error("Decap CMS script failed to load.");
      }
    }

    // initial run
    checkSession();
  </script>
</body>
</html>
