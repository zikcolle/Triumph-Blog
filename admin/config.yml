backend:
  name: git-gateway
  branch: main

media_folder: simage
public_folder: /simage

collections:
  - name: site_content
    label: Site Content
    files:
      - name: posts
        label: Blog Posts
        file: posts.json
        description: Manage all blog posts for Tryumph Magazine
        fields:
          - name: articles
            label: Articles
            widget: list
            fields:
              - { label: "ID", name: id, widget: string }
              - { label: "Title", name: title, widget: string }
              - label: "Category"
                name: category
                widget: select
                options:
                  - { label: "Investing", value: "investing" }
                  - { label: "Markets", value: "markets" }
                  - { label: "Cryptocurrency", value: "crypto" }
                  - { label: "Personal Finance", value: "personal-finance" }
              - { label: "Tags", name: tags, widget: list }
              - { label: "Author", name: author, widget: string }
              - { label: "Author Bio", name: authorBio, widget: string }
              - { label: "Author Link", name: authorLink, widget: string, default: "about.html" }
              - { label: "Date", name: date, widget: string }
              - { label: "Image", name: image, widget: image }
              - { label: "Summary", name: summary, widget: text }
              - { label: "Body (HTML)", name: body, widget: text }
